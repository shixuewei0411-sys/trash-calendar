<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>倒垃圾打卡日历</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    /* ========== Header / 下次轮到 ========== */
    .next-banner {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      padding: 24px 20px;
      margin-bottom: 16px;
      color: #fff;
      text-align: center;
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
      position: relative;
      overflow: hidden;
    }
    .next-banner::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .next-label {
      font-size: 14px;
      opacity: 0.85;
      letter-spacing: 2px;
    }
    .next-person {
      font-size: 32px;
      font-weight: 700;
      margin: 8px 0 4px;
    }
    .next-person .name {
      display: inline-block;
      padding: 0 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.20);
    }
    .next-hint {
      font-size: 13px;
      opacity: 0.70;
    }

    /* ========== Stats ========== */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      flex: 1;
      background: #fff;
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .stat-card:active {
      transform: scale(0.97);
    }
    .stat-card.active-turn {
      box-shadow: 0 0 0 2px #667eea, 0 2px 12px rgba(102,126,234,0.20);
    }
    .stat-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .stat-count {
      font-size: 24px;
      font-weight: 700;
    }
    .stat-card:nth-child(1) .stat-count { color: #667eea; }
    .stat-card:nth-child(2) .stat-count { color: #f093fb; }

    /* ========== Calendar ========== */
    .calendar-card {
      background: #fff;
      border-radius: 16px;
      padding: 16px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 4px;
    }
    .cal-nav {
      background: none;
      border: none;
      font-size: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      color: #666;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-nav:hover { background: #f0f0f0; }
    .cal-title {
      font-size: 18px;
      font-weight: 600;
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 13px;
      color: #999;
      margin-bottom: 6px;
    }
    .cal-weekdays span:first-child,
    .cal-weekdays span:last-child {
      color: #e06c6c;
    }

    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      position: relative;
      user-select: none;
      min-height: 44px;
    }
    .day-cell.other-month {
      color: #ccc;
      pointer-events: none;
    }
    .day-cell.today {
      font-weight: 700;
      color: #667eea;
    }
    .day-cell:not(.other-month):hover {
      background: #f5f5ff;
    }
    .day-cell:not(.other-month):active {
      transform: scale(0.92);
    }

    /* Day cell — person badge */
    .day-cell .badge {
      position: absolute;
      bottom: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 10px;
      line-height: 20px;
      text-align: center;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .day-cell .badge-a { background: #667eea; }
    .day-cell .badge-b { background: #f093fb; }

    /* Day cell — camera icon (has photo) */
    .day-cell .photo-indicator {
      position: absolute;
      top: 2px;
      right: 2px;
      font-size: 10px;
      opacity: 0.7;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.15));
    }

    /* ========== Recent Records ========== */
    .records-card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .records-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #555;
    }
    .records-list {
      max-height: 200px;
      overflow-y: auto;
    }
    .record-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 4px;
      border-bottom: 1px solid #f5f5f5;
      font-size: 14px;
    }
    .record-item:last-child {
      border-bottom: none;
    }
    .record-date {
      color: #888;
      min-width: 90px;
    }
    .record-person {
      font-weight: 600;
    }
    .record-person.a { color: #667eea; }
    .record-person.b { color: #f093fb; }
    .record-photo-thumb {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      object-fit: cover;
      cursor: pointer;
      margin-left: auto;
      transition: transform 0.12s;
      border: 1px solid #eee;
    }
    .record-photo-thumb:active {
      transform: scale(0.92);
    }
    .no-photo-placeholder {
      margin-left: auto;
      color: #ddd;
      font-size: 18px;
    }
    .empty-records {
      color: #bbb;
      text-align: center;
      padding: 24px 0;
      font-size: 14px;
    }

    /* ========== Modal ========== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.40);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.15s;
    }
    .modal-overlay.open {
      display: flex;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-box {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px 20px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      animation: slideUp 0.2s;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-date {
      font-size: 16px;
      color: #888;
      margin-bottom: 8px;
    }
    .modal-question {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .modal-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
      color: #fff;
    }
    .modal-btn:active { transform: scale(0.95); }
    .modal-btn.a {
      background: linear-gradient(135deg, #667eea, #7c93f5);
      box-shadow: 0 4px 12px rgba(102,126,234,0.30);
    }
    .modal-btn.b {
      background: linear-gradient(135deg, #f093fb, #f5a6ff);
      box-shadow: 0 4px 12px rgba(240,147,251,0.30);
    }
    .modal-btn.cancel {
      background: #f0f0f0;
      color: #999;
      flex: 0.5;
    }
    .modal-btn.delete {
      background: #fee;
      color: #e06c6c;
      flex: 0.5;
    }

    /* --- Photo upload area in modal --- */
    .photo-upload-area {
      margin: 12px 0 16px;
      padding: 12px;
      border: 2px dashed #ddd;
      border-radius: 12px;
      transition: border-color 0.15s;
      cursor: pointer;
    }
    .photo-upload-area:hover {
      border-color: #667eea;
    }
    .photo-upload-area.has-photo {
      border-style: solid;
      border-color: #667eea;
      background: #f8f8ff;
    }
    .photo-upload-area input[type="file"] {
      display: none;
    }
    .photo-upload-label {
      display: block;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
    }
    .photo-upload-label .icon {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
    }
    .photo-preview {
      max-width: 100%;
      max-height: 150px;
      border-radius: 8px;
      object-fit: contain;
      cursor: pointer;
    }
    .photo-preview-wrap {
      position: relative;
      display: inline-block;
    }
    .photo-remove-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: none;
      background: #e06c6c;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      line-height: 24px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .photo-storage-warn {
      font-size: 11px;
      color: #e06c6c;
      margin-top: 4px;
      display: none;
    }

    /* ========== Photo Viewer (full-screen) ========== */
    .viewer-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.2s;
    }
    .viewer-overlay.open {
      display: flex;
    }
    .viewer-overlay img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
      object-fit: contain;
    }
    .viewer-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      line-height: 44px;
      text-align: center;
    }

    /* ========== Name Settings ========== */
    .settings-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
    }
    .settings-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .settings-bar input:focus {
      border-color: #667eea;
    }
    .settings-bar button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .settings-bar button:hover { background: #5a6fd6; }

    /* ========== Storage bar ========== */
    .storage-bar-wrap {
      margin-bottom: 12px;
      background: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      display: none;
    }
    .storage-bar-label {
      font-size: 11px;
      color: #999;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    .storage-bar-track {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      overflow: hidden;
    }
    .storage-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #f093fb);
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ========== Responsive ========== */
    @media (max-width: 420px) {
      body { padding: 10px; }
      .next-banner { padding: 18px 16px; }
      .next-person { font-size: 26px; }
      .calendar-card { padding: 12px 8px; }
      .day-cell { font-size: 13px; min-height: 40px; }
      .day-cell .badge { width: 18px; height: 18px; line-height: 18px; font-size: 9px; }
      .day-cell .photo-indicator { font-size: 8px; }
    }

    /* Scrollbar */
    .records-list::-webkit-scrollbar { width: 4px; }
    .records-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  </style>
</head>
<body>
<div class="container" id="app">

  <!-- 下次轮到谁 -->
  <div class="next-banner">
    <div class="next-label">♻️ 下次倒垃圾轮到</div>
    <div class="next-person">
      <span class="name" id="nextName">—</span>
    </div>
    <div class="next-hint" id="nextHint">点击日历日期打卡记录</div>
  </div>

  <!-- 统计数据 -->
  <div class="stats-row">
    <div class="stat-card" id="statA">
      <div class="stat-name" id="nameA">室友A</div>
      <div class="stat-count" id="countA">0</div>
      <div style="font-size:12px;color:#aaa;">次</div>
    </div>
    <div class="stat-card" id="statB">
      <div class="stat-name" id="nameB">室友B</div>
      <div class="stat-count" id="countB">0</div>
      <div style="font-size:12px;color:#aaa;">次</div>
    </div>
  </div>

  <!-- 姓名设置 -->
  <div class="settings-bar">
    <input type="text" id="inputA" placeholder="室友A称呼" maxlength="8">
    <input type="text" id="inputB" placeholder="室友B称呼" maxlength="8">
    <button id="saveNamesBtn">保存</button>
  </div>

  <!-- 存储用量 -->
  <div class="storage-bar-wrap" id="storageBar">
    <div class="storage-bar-label">
      <span>📸 照片存储</span>
      <span id="storageText">0 KB</span>
    </div>
    <div class="storage-bar-track">
      <div class="storage-bar-fill" id="storageFill" style="width:0%"></div>
    </div>
  </div>

  <!-- 日历 -->
  <div class="calendar-card">
    <div class="cal-header">
      <button class="cal-nav" id="prevMonth">◀</button>
      <span class="cal-title" id="calTitle">2026年 6月</span>
      <button class="cal-nav" id="nextMonth">▶</button>
    </div>
    <div class="cal-weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>

  <!-- 最近记录 -->
  <div class="records-card">
    <div class="records-title">📋 最近打卡记录</div>
    <div class="records-list" id="recordsList">
      <div class="empty-records">还没有打卡记录，点击日期开始吧</div>
    </div>
  </div>
</div>

<!-- 打卡弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-date" id="modalDate">2026年6月10日</div>
    <div class="modal-question">今天是谁倒的垃圾？</div>
    <div class="modal-actions">
      <button class="modal-btn a" id="modalBtnA">室友A</button>
      <button class="modal-btn b" id="modalBtnB">室友B</button>
    </div>

    <!-- 照片上传 -->
    <div class="photo-upload-area" id="photoArea">
      <label class="photo-upload-label" id="photoLabel">
        <span class="icon">📷</span>
        <span id="photoLabelText">点击上传照片作为凭证</span>
      </label>
      <div id="photoPreviewWrap" class="photo-preview-wrap" style="display:none;">
        <img id="photoPreview" class="photo-preview" alt="preview">
        <button class="photo-remove-btn" id="photoRemoveBtn">×</button>
      </div>
      <input type="file" id="photoInput" accept="image/*" capture="environment">
      <div class="photo-storage-warn" id="storageWarn">⚠️ 存储空间不足，请删除旧照片</div>
    </div>

    <div style="display:flex;gap:12px;">
      <button class="modal-btn cancel" id="modalCancel">取消</button>
      <button class="modal-btn delete" id="modalDelete">取消打卡</button>
    </div>
  </div>
</div>

<!-- 全屏照片查看 -->
<div class="viewer-overlay" id="viewer">
  <button class="viewer-close" id="viewerClose">✕</button>
  <img id="viewerImg" src="" alt="photo">
</div>

<script>
// ============================================================
//  DATA
// ============================================================
const STORAGE_KEY = 'trash_calendar_data';

let state = {
  nameA: '室友A',
  nameB: '室友B',
  records: {},    // { '2026-06-10': { person: 'A', photo: 'data:...' | null } }
};

// View state
let viewYear = 2026;
let viewMonth = 6;   // 1-based
let modalDateStr = null;
let pendingPhotoDataUrl = null; // photo data URL chosen but not yet saved

// localStorage quota estimate ~5MB. We track size approximately.
const STORAGE_WARN_THRESHOLD = 4 * 1024 * 1024; // 4MB

// ============================================================
//  Persistence
// ============================================================
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state.nameA = parsed.nameA || '室友A';
      state.nameB = parsed.nameB || '室友B';
      state.records = parsed.records || {};
    }
  } catch (e) {
    console.warn('Load data error', e);
  }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      nameA: state.nameA,
      nameB: state.nameB,
      records: state.records,
    }));
  } catch (e) {
    // localStorage full — try to warn user
    console.warn('Save data error', e);
    alert('⚠️ 存储空间不足！请删除一些旧打卡照片，或清除浏览器数据。');
  }
}

// ============================================================
//  Storage size estimation
// ============================================================
function getStorageSize() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? new Blob([raw]).size : 0;
  } catch (e) {
    return 0;
  }
}

function renderStorageBar() {
  const size = getStorageSize();
  const sizeKB = Math.round(size / 1024);
  const sizeMB = (size / 1024 / 1024).toFixed(1);
  const bar = document.getElementById('storageBar');
  const fill = document.getElementById('storageFill');
  const text = document.getElementById('storageText');

  // Only show if there are photos (size > 1KB)
  if (size < 1024) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'block';

  // Estimate percentage against ~5MB quota
  const pct = Math.min(100, (size / (5 * 1024 * 1024)) * 100);
  fill.style.width = pct + '%';
  if (pct > 80) fill.style.background = 'linear-gradient(90deg, #e06c6c, #f093fb)';
  else if (pct > 60) fill.style.background = 'linear-gradient(90deg, #f5a623, #f093fb)';
  else fill.style.background = 'linear-gradient(90deg, #667eea, #f093fb)';

  text.textContent = sizeMB + ' MB';
}

// ============================================================
//  Core Logic
// ============================================================
function getCounts() {
  let countA = 0, countB = 0;
  for (const val of Object.values(state.records)) {
    const person = val.person || val; // support old format
    if (person === 'A') countA++;
    else if (person === 'B') countB++;
  }
  return { countA, countB };
}

function getNextPerson() {
  const { countA, countB } = getCounts();
  if (countA < countB) return 'A';
  if (countB < countA) return 'B';
  const dates = Object.keys(state.records).sort();
  if (dates.length === 0) return 'A';
  const lastVal = state.records[dates[dates.length - 1]];
  const lastPerson = lastVal.person || lastVal;
  return lastPerson === 'A' ? 'B' : 'A';
}

function getSortedRecords(limit = 50) {
  const entries = Object.entries(state.records);
  entries.sort((a, b) => b[0].localeCompare(a[0]));
  return entries.slice(0, limit);
}

// ============================================================
//  Image compression (to fit in localStorage)
// ============================================================
function compressImage(file, maxWidth = 1024, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) {
          h = h * maxWidth / w;
          w = maxWidth;
        }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ============================================================
//  Calendar Rendering
// ============================================================
function renderCalendar() {
  const titleEl = document.getElementById('calTitle');
  titleEl.textContent = `${viewYear}年 ${viewMonth}月`;

  const firstDay = new Date(viewYear, viewMonth - 1, 1);
  const lastDay = new Date(viewYear, viewMonth, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay();

  const container = document.getElementById('calDays');
  container.innerHTML = '';

  const prevLastDay = new Date(viewYear, viewMonth - 1, 0).getDate();
  for (let i = startWeekday - 1; i >= 0; i--) {
    const cell = document.createElement('div');
    cell.className = 'day-cell other-month';
    cell.textContent = prevLastDay - i;
    container.appendChild(cell);
  }

  const today = new Date();
  const todayStr = formatDate(today);
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${viewYear}-${String(viewMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (dateStr === todayStr) cell.classList.add('today');
    cell.textContent = d;

    const record = state.records[dateStr];
    if (record) {
      const person = record.person || record;
      const badge = document.createElement('span');
      badge.className = `badge badge-${person.toLowerCase()}`;
      badge.textContent = person;
      cell.appendChild(badge);

      // Photo indicator
      if (record.photo) {
        const cam = document.createElement('span');
        cam.className = 'photo-indicator';
        cam.textContent = '📷';
        cell.appendChild(cam);
      }
    }

    cell.dataset.date = dateStr;
    cell.addEventListener('click', () => openModal(dateStr));
    container.appendChild(cell);
  }

  const totalCells = startWeekday + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell other-month';
    cell.textContent = i;
    container.appendChild(cell);
  }
}

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDateCN(dateStr) {
  const parts = dateStr.split('-');
  return `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
}

// ============================================================
//  Top Banner & Stats
// ============================================================
function renderHeader() {
  const next = getNextPerson();
  const name = next === 'A' ? state.nameA : state.nameB;
  document.getElementById('nextName').textContent = name;

  const { countA, countB } = getCounts();
  document.getElementById('countA').textContent = countA;
  document.getElementById('countB').textContent = countB;
  document.getElementById('nameA').textContent = state.nameA;
  document.getElementById('nameB').textContent = state.nameB;

  document.getElementById('statA').classList.toggle('active-turn', next === 'A');
  document.getElementById('statB').classList.toggle('active-turn', next === 'B');

  const diff = Math.abs(countA - countB);
  let hint = '';
  if (diff === 0) {
    hint = countA === 0 ? '还没有打卡记录，点击日期开始吧' : '当前次数持平，轮流交替';
  } else {
    hint = `${name}比另一位少 ${diff} 次`;
  }
  document.getElementById('nextHint').textContent = hint;
}

// ============================================================
//  Recent Records
// ============================================================
function renderRecords() {
  const list = document.getElementById('recordsList');
  const sorted = getSortedRecords(30);
  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty-records">还没有打卡记录，点击日期开始吧</div>';
    return;
  }
  list.innerHTML = '';
  for (const [dateStr, record] of sorted) {
    const person = record.person || record;
    const div = document.createElement('div');
    div.className = 'record-item';
    const name = person === 'A' ? state.nameA : state.nameB;
    div.innerHTML = `
      <span class="record-date">${formatDateCN(dateStr)}</span>
      <span class="record-person ${person.toLowerCase()}">${name}</span>
    `;
    // Photo thumbnail
    if (record.photo) {
      const img = document.createElement('img');
      img.className = 'record-photo-thumb';
      img.src = record.photo;
      img.alt = 'photo';
      img.addEventListener('click', (e) => {
        e.stopPropagation();
        openViewer(record.photo);
      });
      div.appendChild(img);
    } else {
      const placeholder = document.createElement('span');
      placeholder.className = 'no-photo-placeholder';
      placeholder.textContent = '📭';
      div.appendChild(placeholder);
    }
    list.appendChild(div);
  }
}

// ============================================================
//  Photo Viewer (full-screen)
// ============================================================
function openViewer(src) {
  document.getElementById('viewerImg').src = src;
  document.getElementById('viewer').classList.add('open');
}

function closeViewer() {
  document.getElementById('viewer').classList.remove('open');
  // Clear src after transition to free memory
  setTimeout(() => {
    if (!document.getElementById('viewer').classList.contains('open')) {
      document.getElementById('viewerImg').src = '';
    }
  }, 300);
}

// ============================================================
//  Modal
// ============================================================
function openModal(dateStr) {
  modalDateStr = dateStr;
  pendingPhotoDataUrl = null;
  document.getElementById('modalDate').textContent = formatDateCN(dateStr);
  document.getElementById('modalBtnA').textContent = state.nameA + ' (A)';
  document.getElementById('modalBtnB').textContent = state.nameB + ' (B)';

  const record = state.records[dateStr];
  const existing = !!(record && record.person);
  const deleteBtn = document.getElementById('modalDelete');
  deleteBtn.style.display = existing ? 'block' : 'none';

  // Show existing photo
  resetPhotoUI();
  if (record && record.photo) {
    showPhotoPreview(record.photo);
  }

  document.getElementById('modal').classList.add('open');
}

function resetPhotoUI() {
  const previewWrap = document.getElementById('photoPreviewWrap');
  previewWrap.style.display = 'none';
  document.getElementById('photoLabel').style.display = 'block';
  document.getElementById('photoArea').classList.remove('has-photo');
  document.getElementById('storageWarn').style.display = 'none';
}

function showPhotoPreview(dataUrl) {
  const previewWrap = document.getElementById('photoPreviewWrap');
  const label = document.getElementById('photoLabel');
  const preview = document.getElementById('photoPreview');
  preview.src = dataUrl;
  previewWrap.style.display = 'inline-block';
  label.style.display = 'none';
  document.getElementById('photoArea').classList.add('has-photo');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalDateStr = null;
  pendingPhotoDataUrl = null;
}

function handleModalPick(person) {
  if (!modalDateStr) return;
  const record = state.records[modalDateStr] || {};
  state.records[modalDateStr] = {
    person: person,
    photo: pendingPhotoDataUrl || record.photo || null,
  };
  saveData();
  closeModal();
  renderAll();
  renderStorageBar();
}

function handleModalDelete() {
  if (!modalDateStr) return;
  delete state.records[modalDateStr];
  saveData();
  closeModal();
  renderAll();
  renderStorageBar();
}

// ============================================================
//  Photo upload in modal
// ============================================================
async function handlePhotoUpload(file) {
  if (!file) return;
  // Check file type
  if (!file.type.startsWith('image/')) {
    alert('请上传图片文件');
    return;
  }
  // Compress
  try {
    const dataUrl = await compressImage(file, 1024, 0.7);
    // Estimate size
    const sizeInBytes = new Blob([dataUrl]).size;
    const totalSize = getStorageSize() + sizeInBytes;

    if (totalSize > STORAGE_WARN_THRESHOLD) {
      document.getElementById('storageWarn').style.display = 'block';
    } else {
      document.getElementById('storageWarn').style.display = 'none';
    }

    pendingPhotoDataUrl = dataUrl;
    showPhotoPreview(dataUrl);
  } catch (e) {
    console.warn('Photo compress error', e);
    alert('照片处理失败，请重试');
  }
}

function handlePhotoRemove() {
  pendingPhotoDataUrl = null;
  resetPhotoUI();

  // If record exists, also clear its photo from storage (on next save)
  if (modalDateStr && state.records[modalDateStr]) {
    state.records[modalDateStr].photo = null;
  }
}

// ============================================================
//  Name Settings
// ============================================================
function saveNames() {
  const a = document.getElementById('inputA').value.trim();
  const b = document.getElementById('inputB').value.trim();
  if (a) state.nameA = a;
  if (b) state.nameB = b;
  if (!state.nameA) state.nameA = '室友A';
  if (!state.nameB) state.nameB = '室友B';
  saveData();
  renderHeader();
  renderRecords();
}

function loadNamesToInput() {
  document.getElementById('inputA').value = state.nameA;
  document.getElementById('inputB').value = state.nameB;
}

// ============================================================
//  Render All
// ============================================================
function renderAll() {
  renderCalendar();
  renderHeader();
  renderRecords();
  renderStorageBar();
}

// ============================================================
//  Compatibility: migrate old format records
// ============================================================
function migrateOldFormat() {
  let changed = false;
  for (const [key, val] of Object.entries(state.records)) {
    if (typeof val === 'string') {
      // Old format: 'A' or 'B' as string
      state.records[key] = { person: val, photo: null };
      changed = true;
    }
  }
  if (changed) saveData();
}

// ============================================================
//  Init
// ============================================================
function init() {
  loadData();
  migrateOldFormat();

  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth() + 1;

  loadNamesToInput();
  renderAll();

  // Calendar nav
  document.getElementById('prevMonth').addEventListener('click', () => {
    viewMonth--;
    if (viewMonth < 1) { viewMonth = 12; viewYear--; }
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 12) { viewMonth = 1; viewYear++; }
    renderCalendar();
  });

  // Modal
  document.getElementById('modalBtnA').addEventListener('click', () => handleModalPick('A'));
  document.getElementById('modalBtnB').addEventListener('click', () => handleModalPick('B'));
  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalDelete').addEventListener('click', handleModalDelete);
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  // Photo upload
  const photoInput = document.getElementById('photoInput');
  photoInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files[0]) {
      handlePhotoUpload(e.target.files[0]);
    }
  });
  // Click the upload area to trigger file picker
  document.getElementById('photoArea').addEventListener('click', (e) => {
    // Don't trigger if clicking remove button or preview
    if (e.target.closest('.photo-remove-btn') || e.target.closest('.photo-preview')) return;
    photoInput.click();
  });
  document.getElementById('photoRemoveBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    handlePhotoRemove();
  });

  // Photo viewer
  document.getElementById('viewerClose').addEventListener('click', closeViewer);
  document.getElementById('viewer').addEventListener('click', (e) => {
    if (e.target === document.getElementById('viewer')) closeViewer();
  });

  // Names
  document.getElementById('saveNamesBtn').addEventListener('click', saveNames);
  document.getElementById('inputB').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveNames();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
